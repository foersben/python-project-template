[project]
site_name = "Python Project Template Docs"
site_description = "Hardened Python Template optimized for Vertical Slice and Agentic Workflows"
site_url = "https://foersben.github.io/python-project-template"
docs_dir = "docs"
site_dir = "site"

# 1. Advanced Markdown Extensions matching Janus theme behavior
markdown_extensions = [
    "admonition",
    "tables",
    "pymdownx.details",
    "pymdownx.inlinehilite",
    "pymdownx.snippets",
    "pymdownx.highlight",
    "pymdownx.tasklist",
    "pymdownx.arithmatex",
    "pymdownx.superfences",
    "toc"
]

# Extension Configuration Tables
[project.markdown_extensions_config.toc]
permalink = true

[project.markdown_extensions_config."pymdownx.highlight"]
anchor_linenums = true

[project.markdown_extensions_config."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown_extensions_config."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions_config."pymdownx.superfences"]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

# 2. Material Theme Structural Configuration
[project.theme]
variant = "modern"
palette = [{
    media = "(prefers-color-scheme: dark)",
    scheme = "slate",
    primary = "black",
    accent = "deep-orange" },
  { media = "(prefers-color-scheme: light)",
    scheme = "default",
    primary = "black",
    accent = "deep-orange"
    },
]
# name = "material"
language = "en"
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "toc.integrate",
    "search.suggest",
    "search.highlight",
    "content.code.copy"
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# 3. Dynamic Color Scheme Switcher (Optically replicated from Project Janus)
# [[project.theme.palette]]
# media = "(prefers-color-scheme: light)"
# scheme = "default"
