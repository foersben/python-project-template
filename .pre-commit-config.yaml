repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: Mypy
        entry: uv run mypy .
        language: system
        types: [python]
      - id: enforce-author-identity
        name: Enforce Author Identity
        entry: bash -c '[ "$(git config --bool commit.gpgsign)" = "true" ]'
        language: system
        pass_filenames: false
